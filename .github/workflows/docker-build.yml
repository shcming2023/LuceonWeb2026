name: Build LuceonWeb arm64 release images

on:
  push:
    branches:
      - codex/luceon-v1-release
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/luceonweb2026-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/luceonweb2026-frontend

jobs:
  build:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend and Worker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/arm64
          pull: true
          no-cache: true
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
          build-args: |
            VERSION=luceon-v1.0.0-rc
            VCS_REF=${{ github.sha }}
            SOURCE_URL=${{ github.server_url }}/${{ github.repository }}
          labels: |
            org.opencontainers.image.version=luceon-v1.0.0-rc
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          provenance: mode=max
          sbom: true

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/arm64
          pull: true
          no-cache: true
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
          build-args: |
            VERSION=luceon-v1.0.0-rc
            VCS_REF=${{ github.sha }}
            SOURCE_URL=${{ github.server_url }}/${{ github.repository }}
          labels: |
            org.opencontainers.image.version=luceon-v1.0.0-rc
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          provenance: mode=max
          sbom: true

  promote:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote verified backend digest without rebuilding
        run: >-
          docker buildx imagetools create
          --tag "${BACKEND_IMAGE}:${{ github.event.release.tag_name }}"
          "${BACKEND_IMAGE}:sha-${GITHUB_SHA}"

      - name: Promote verified frontend digest without rebuilding
        run: >-
          docker buildx imagetools create
          --tag "${FRONTEND_IMAGE}:${{ github.event.release.tag_name }}"
          "${FRONTEND_IMAGE}:sha-${GITHUB_SHA}"
