services:
  upload-server:
    environment:
      # Tier 2 Standard uses the current phase-one local real runtime.
      # MinerU and Ollama run on the host; containers access them through host.docker.internal.
      - LOCAL_MINERU_ENDPOINT=${LOCAL_MINERU_ENDPOINT:-http://host.docker.internal:8083}
      - OLLAMA_API_URL=${OLLAMA_API_URL:-http://host.docker.internal:11434}
      - OLLAMA_TIER2_MODEL=${OLLAMA_TIER2_MODEL:-qwen3.5:9b}
      - ALLOW_LOCAL_AI_ENDPOINT=true
      - DISABLE_AI_SKELETON_FALLBACK=true
      - ALLOW_AI_SKELETON_FALLBACK=false

  minio-init:
    image: minio/mc:latest
    container_name: cms-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - cms-network
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to be fully ready...';
      sleep 2;
      mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin};
      mc mb myminio/eduassets --ignore-existing;
      mc mb myminio/eduassets-parsed --ignore-existing;
      mc anonymous set download myminio/eduassets;
      mc anonymous set download myminio/eduassets-parsed;
      echo 'MinIO buckets initialized successfully.';
      "
