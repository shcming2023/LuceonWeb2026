name: ${COMPOSE_PROJECT_NAME:-luceonweb2026-review}

services:
  frontend:
    build:
      context: ./frontend
    image: ${LUCEON_REVIEW_FRONTEND_IMAGE:-luceonweb2026-review-frontend:local}
    restart: unless-stopped
    ports:
      - "${LUCEON_REVIEW_WEB_PORT:-28081}:80"
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - luceon-review-net

  backend:
    build:
      context: ./backend
    image: ${LUCEON_REVIEW_BACKEND_IMAGE:-luceonweb2026-review-backend:local}
    restart: unless-stopped
    ports:
      - "${LUCEON_REVIEW_API_PORT:-28080}:8000"
    environment:
      - TZ=Asia/Shanghai
      - REDIS_HOST=redis
      - DATABASE_URL=sqlite:////data/mineru.db
      - WORKFLOW_DATABASE_URL=${WORKFLOW_DATABASE_URL:-}
      - LUCEON_WORKER_V1_BATCH_ENABLED=${LUCEON_WORKER_V1_BATCH_ENABLED:-false}
      - LUCEON_WORKER_V1_AUTO_RETRY_ENABLED=${LUCEON_WORKER_V1_AUTO_RETRY_ENABLED:-false}
      - LUCEON_AUTH_DISABLED=${LUCEON_AUTH_DISABLED:-true}
      - LUCEON_PUBLIC_WORKSPACE_USER_ID=${LUCEON_PUBLIC_WORKSPACE_USER_ID:-2}
      - LUCEON_PUBLIC_WORKSPACE_EMAIL=${LUCEON_PUBLIC_WORKSPACE_EMAIL:-workspace@luceon.local}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:?set MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-mineru-files}
      - MINIO_MDS_BUCKET=${MINIO_MDS_BUCKET:-mds}
      - MINERU_API_URL=${MINERU_API_URL:-http://host.docker.internal:8083}
      - GPU_WRAPPER_URL=${GPU_WRAPPER_URL:-${MINERU_API_URL:-http://host.docker.internal:8083}}
      - GPU_WRAPPER_API_KEY=${GPU_WRAPPER_API_KEY:-}
      - LUCEON_PIPELINE_SCRIPT=/app/scripts/luceon_pdf_pipeline.py
      - LUCEON_PIPELINE_WORKDIR=/app/scripts
      - LUCEON_RUNTIME_CONFIG=/data/runtime_config.json
      - LUCEON_BACKUP_ROOT=/backups
      - LUCEON_PIPELINE_WORK_ROOT=/data/pipeline-work
      - WORKFLOW_V2_CANONICAL_OUTLINE_CACHE=/data/workflow-v2-model-cache/canonical-outline
      - LUCEON_PUBLIC_API_BASE_URL=${LUCEON_PUBLIC_API_BASE_URL:-}
      - CHROME_BIN=${CHROME_BIN:-/usr/bin/chromium}
      - LUCEON_POPO_RAW_SKILL=/app/app/workflow_v2/runtime/canonical
      - LUCEON_RAW_CLEAN_SKILL=/skills/eduassets-raw-cleaner
      - WORKFLOW_V2_SEMANTIC_SCRIPT=/app/app/workflow_v2/runtime/semantic/scripts/annotate_material.py
      - WORKFLOW_V2_CLEANLATEX_BRIDGE=/app/app/workflow_v2/runtime/elegantbook/scripts/semantic_markdown_to_cleanlatex.py
      - WORKFLOW_V2_ELEGANTBOOK_BUILDER=/app/app/workflow_v2/runtime/elegantbook/scripts/clean_to_elegantbook.py
      - WORKFLOW_V2_TEX_CONTAINER=sharelatex
      - WORKFLOW_V2_LATEX_REFINER=/skills/refine-elegantbook-latex/scripts/refine_elegantbook_latex.py
      - LUCEON_RAW_OUTLINE_LLM=${LUCEON_RAW_OUTLINE_LLM:-1}
      - LUCEON_RAW_OUTLINE_VISION=${LUCEON_RAW_OUTLINE_VISION:-0}
      - LUCEON_CLEAN_MEDIA_VISION=${LUCEON_CLEAN_MEDIA_VISION:-off}
      - LUCEON_RAW_OUTLINE_LLM_MAX_RISK_CANDIDATES=${LUCEON_RAW_OUTLINE_LLM_MAX_RISK_CANDIDATES:-120}
      - LUCEON_RAW_OUTLINE_VISUAL_MAX_CANDIDATES=${LUCEON_RAW_OUTLINE_VISUAL_MAX_CANDIDATES:-40}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - LLM_DEFAULT_MODEL=${LLM_DEFAULT_MODEL:-${DEEPSEEK_DEFAULT_MODEL:-deepseek-v4-flash}}
      - LLM_REASONING_MODEL=${LLM_REASONING_MODEL:-${DEEPSEEK_REASONING_MODEL:-deepseek-v4-pro}}
      - DEEPSEEK_DEFAULT_MODEL=${DEEPSEEK_DEFAULT_MODEL:-deepseek-v4-flash}
      - DEEPSEEK_FLASH_MODEL=${DEEPSEEK_FLASH_MODEL:-${DEEPSEEK_DEFAULT_MODEL:-deepseek-v4-flash}}
      - DEEPSEEK_REASONING_MODEL=${DEEPSEEK_REASONING_MODEL:-deepseek-v4-pro}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-${DEEPSEEK_DEFAULT_MODEL:-deepseek-v4-flash}}
      - DEEPSEEK_OUTLINE_DECISION_MAX_TOKENS=${DEEPSEEK_OUTLINE_DECISION_MAX_TOKENS:-24000}
      - DEEPSEEK_OUTLINE_DECISION_MAX_TOKENS=${DEEPSEEK_OUTLINE_DECISION_MAX_TOKENS:-16000}
      - DEEPSEEK_OUTLINE_GLOBAL_MAX_CANDIDATES=${DEEPSEEK_OUTLINE_GLOBAL_MAX_CANDIDATES:-500}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - DASHSCOPE_VISION_MODEL=${DASHSCOPE_VISION_MODEL:-qwen3.7-plus}
      - VISION_MODEL=${VISION_MODEL:-${DASHSCOPE_VISION_MODEL:-qwen3.7-plus}}
      - ASR_MODEL=${ASR_MODEL:-${DASHSCOPE_ASR_MODEL:-fun-asr-flash-2026-06-15}}
      - TTS_MODEL=${TTS_MODEL:-${DASHSCOPE_TTS_MODEL:-qwen3-tts-instruct-flash-realtime}}
      - IMAGE_GENERATION_MODEL=${IMAGE_GENERATION_MODEL:-${DASHSCOPE_IMAGE_MODEL:-qwen-image-2.0-pro}}
    volumes:
      - ./runtime/backend:/data
      - ./runtime/backups:/backups
      - /var/run/docker.sock:/var/run/docker.sock
      - /Users/concm/.codex/skills/eduassets-raw-cleaner:/skills/eduassets-raw-cleaner:ro
      - /Users/concm/.codex/skills/refine-elegantbook-latex:/skills/refine-elegantbook-latex:ro
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - luceon-review-net

  workflow-v2-worker:
    image: ${LUCEON_REVIEW_BACKEND_IMAGE:-luceonweb2026-review-backend:local}
    restart: unless-stopped
    command: ["python", "scripts/workflow_v2_worker.py", "--loop", "--worker-id", "workflow-v2-local"]
    environment:
      - TZ=Asia/Shanghai
      - REDIS_HOST=redis
      - DATABASE_URL=sqlite:////data/mineru.db
      - WORKFLOW_DATABASE_URL=${WORKFLOW_DATABASE_URL:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:?set MINIO_ENDPOINT}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
      - MINIO_BUCKET=${MINIO_BUCKET:-mineru-files}
      - MINIO_MDS_BUCKET=${MINIO_MDS_BUCKET:-mds}
      - LUCEON_PIPELINE_WORK_ROOT=/data/pipeline-work
      - WORKFLOW_V2_CANONICAL_OUTLINE_CACHE=/data/workflow-v2-model-cache/canonical-outline
      - LUCEON_POPO_RAW_SKILL=/app/app/workflow_v2/runtime/canonical
      - WORKFLOW_V2_SEMANTIC_SCRIPT=/app/app/workflow_v2/runtime/semantic/scripts/annotate_material.py
      - WORKFLOW_V2_CLEANLATEX_BRIDGE=/app/app/workflow_v2/runtime/elegantbook/scripts/semantic_markdown_to_cleanlatex.py
      - WORKFLOW_V2_ELEGANTBOOK_BUILDER=/app/app/workflow_v2/runtime/elegantbook/scripts/clean_to_elegantbook.py
      - WORKFLOW_V2_LATEX_REFINER=/skills/refine-elegantbook-latex/scripts/refine_elegantbook_latex.py
      - WORKFLOW_V2_TEX_CONTAINER=sharelatex
      - LUCEON_RAW_OUTLINE_LLM=${LUCEON_RAW_OUTLINE_LLM:-1}
      - LUCEON_RAW_OUTLINE_VISION=${LUCEON_RAW_OUTLINE_VISION:-0}
      - LUCEON_CLEAN_MEDIA_VISION=${LUCEON_CLEAN_MEDIA_VISION:-off}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      - DEEPSEEK_DEFAULT_MODEL=${DEEPSEEK_DEFAULT_MODEL:-deepseek-v4-flash}
      - DEEPSEEK_FLASH_MODEL=${DEEPSEEK_FLASH_MODEL:-${DEEPSEEK_DEFAULT_MODEL:-deepseek-v4-flash}}
      - DEEPSEEK_REASONING_MODEL=${DEEPSEEK_REASONING_MODEL:-deepseek-v4-pro}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-${DEEPSEEK_DEFAULT_MODEL:-deepseek-v4-flash}}
      - DEEPSEEK_OUTLINE_DECISION_MAX_TOKENS=${DEEPSEEK_OUTLINE_DECISION_MAX_TOKENS:-24000}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - DASHSCOPE_VISION_MODEL=${DASHSCOPE_VISION_MODEL:-qwen3.7-plus}
      - VISION_MODEL=${VISION_MODEL:-${DASHSCOPE_VISION_MODEL:-qwen3.7-plus}}
    volumes:
      - ./runtime/backend:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /Users/concm/.codex/skills/refine-elegantbook-latex:/skills/refine-elegantbook-latex:ro
    depends_on:
      - backend
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - luceon-review-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly no
    networks:
      - luceon-review-net

networks:
  luceon-review-net:
    name: ${LUCEON_REVIEW_NETWORK:-luceonweb2026-review-net}
    driver: bridge
