services:
  # ── 1. 覆盖主服务配置，适配 Windows 本地路径 ──
  upload-server:
    volumes:
      # 覆盖 Mac 绝对路径，改用本地相对路径存放假日志
      - ./data/logs:/host/mineru-logs:ro
    environment:
      # 强制指向本地 Docker 网络里的 AI 和 MinerU 容器
      - MINERU_API_URL=http://mineru:8080
      - OLLAMA_API_URL=http://ollama:11434
      - ALLOW_LOCAL_AI_ENDPOINT=true

  # ── 2. 本地 AI 降配版推理引擎 (Ollama) ──
  ollama:
    image: ollama/ollama:latest
    container_name: cms-ollama-local
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - cms-network
    # 容器启动时自动拉取一个极小参数模型（如 qwen2.5:0.5b），极大减轻本地 CPU 压力
    entrypoint: >
      /bin/sh -c "
      ollama serve &
      sleep 5 &&
      echo 'Pulling lightweight model for Tier 2 testing...' &&
      ollama pull qwen2.5:0.5b &&
      wait"

  # ── 3. 本地解析引擎 (MinerU) ──
  # 使用官方或兼容的 MinerU 镜像，本地测试时替代 Mac mini 的 Conda 进程
  mineru:
    image: opendatalab/mineru:latest
    container_name: cms-mineru-local
    restart: unless-stopped
    ports:
      - "8083:8080"
    networks:
      - cms-network
    # 本地只跑轻量解析或给出一个 Mock API 端口即可验证联调链路
    command: ["uvicorn", "api:app", "--host", "0.0.0.0", "--port", "8080"]

  # ── 4. 自动初始化 MinIO 桶 ──
  minio-init:
    image: minio/mc:latest
    container_name: cms-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - cms-network
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO...';
      mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin};
      mc mb myminio/eduassets --ignore-existing;
      mc mb myminio/eduassets-parsed --ignore-existing;
      mc anonymous set download myminio/eduassets;
      mc anonymous set download myminio/eduassets-parsed;
      echo 'MinIO buckets initialized successfully.';
      exit 0;
      "

volumes:
  ollama-data:
    name: cms-ollama-data
