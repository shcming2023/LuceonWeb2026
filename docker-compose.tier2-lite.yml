services:
  # ── 1. 覆盖主服务配置，适配 Windows 本地路径 ──
  upload-server:
    volumes:
      - ./data/logs:/host/mineru-logs:ro
    environment:
      - MINERU_API_URL=http://mineru:8080
      - OLLAMA_API_URL=http://ollama:11434
      - ALLOW_LOCAL_AI_ENDPOINT=true

  # ── 2. 本地 AI 降配版推理引擎 (Ollama) ──
  ollama:
    image: ollama/ollama:latest
    container_name: cms-ollama-local
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - cms-network
    # 不强制拉取 qwen2.5:0.5b，仅启动 serve 服务
    entrypoint: >
      /bin/sh -c "ollama serve"

  # ── 3. 本地解析引擎 (MinerU) ──
  mineru:
    # 使用极轻量镜像代替 opendatalab/mineru:latest，避免预检强制下载 20GB 镜像
    image: python:3.10-alpine
    container_name: cms-mineru-local
    restart: unless-stopped
    ports:
      - "8083:8080"
    networks:
      - cms-network
    command: ["sh", "-c", "mkdir -p /mock && echo '{\"status\":\"mock\"}' > /mock/index.json && echo '{\"status\":\"ok\"}' > /mock/health && cd /mock && python -m http.server 8080"]

  # ── 4. 自动初始化 MinIO 桶 ──
  minio-init:
    image: minio/mc:latest
    container_name: cms-minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - cms-network
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO...';
      mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin};
      mc mb myminio/eduassets --ignore-existing;
      mc mb myminio/eduassets-parsed --ignore-existing;
      mc anonymous set download myminio/eduassets;
      mc anonymous set download myminio/eduassets-parsed;
      echo 'MinIO buckets initialized successfully.';
      exit 0;
      "

volumes:
  ollama-data:
    name: cms-ollama-data
